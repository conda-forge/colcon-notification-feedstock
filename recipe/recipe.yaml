context:
  name: colcon-notification
  version: "0.3.1"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/${{ name | replace('-', '_') }}-${{ version }}.tar.gz
  sha256: cffd62024d8f5a7f742b0c191a44c967a479f936ddb12934abd69c0cf624e136

build:
  number: 0
  script: ${{ PYTHON }} -m pip install . -vv

requirements:
  build:
    - if: build_platform != target_platform
      then:
        - python
        - cross-python_${{ target_platform }}
  host:
    - pip
    - python
    - setuptools
  run:
    - colcon-core >=0.3.7
    - if: linux
      then: notify2
    - python
    - if: win
      then: pywin32

tests:
  - python:
      imports:
        - colcon_notification
      pip_check: false
  - requirements:
      run:
        - if: "python_impl == \"cpython\""
          then: pip
    script:
      - if: "python_impl == \"cpython\""
        then: pip check

about:
  summary: Extension for colcon to provide status notifications.
  license: Apache-2.0
  license_file: LICENSE
  homepage: https://colcon.readthedocs.io

extra:
  recipe-maintainers:
    - j-rivero
    - seanyen
    - wolfv
    - ruben-arts
    - Tobias-Fischer
